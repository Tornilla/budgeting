<html lang="en">
    <head>
        <title>budgets</title>

    </head>

    <body>
        <div>
            <input type="number" name="salary" id="salary" placeholder="salary"></input>
        </div>

        <button id="addexpense">add expenses</button>

        <div id="budgetModal" class="modal" style="display: none;">
            <div id="budget-container">
                <span class="close" id="closeModal">&times;</span>
                <h2>Add expenses</h2>
                <p>add expenses na to</p>
                <form>
                    <input type="text" name="description" id="description" placeholder="expense name">
                    <input type="number" name="budget" id="budget" placeholder="peso">
                    <!--<input type="number" name="percentage" id="percentage" placeholder="Enter percentage">-->
                    <button onclick="submitexpense()" type="button">add expense</button>
                </form>
                <script>
                    var totalbudget = 0;
                    function submitexpense(){
                        var desc = document.getElementById("description");
                        var description = desc.value;
                        var budget = document.getElementById("budget");
                        var budgetval = budget.value; 
                        //var budgetPercent = document.getElementById("percentage");
                        //var budgetPercentage = budgetPercent.value;
                        //var maxpercent = 100;
                        //console.log(description);
                        // console.log(budget);
                        //console.log(budgetPercentage);

                        /*if(budgetPercentage>100){
                            alert("maximum percent is 100!");
                        }*/
                        totalbudget = parseFloat(totalbudget) + parseFloat(budgetval);
                        //totalbudget += budgetval;
                        var output = description + " " + totalbudget;
                        var outputDiv = document.createElement("div");
                        outputDiv.innerHTML=output;
                        document.getElementById("budgetsOutput").appendChild(outputDiv);
                        document.getElementById("description").value="";
                        document.getElementById("budget").value="";
                        //document.getElementById("percentage").value="";
                        console.log(totalbudget);
                    }
                </script>
            </div>
        </div>
        <script>
            var addbudget = document.getElementById("addexpense");
            var budget = document.getElementById("budgetModal");
            var closeModal = document.getElementById("closeModal");

            addbudget.addEventListener("click", function(){
                budgetModal.style.display="block";
            });

            closeModal.addEventListener("click", function(){
                budgetModal.style.display="none";
            });

            window.addEventListener("click", function(){
                if (event.target === budget){
                    budgetModal.style.display="none";
                }
            });
        </script>
        <hr>

            <div id="budgetsOutput">

                }

                    var getsalary = document.getElementById("salary");
                    var salary = getsalary.value;
                    //var totalbudget = document.getElementById("budget");

                    var summary = salary - totalbudget;
                    var outputsum = document.createElement("div");
                    outputsum.innerHTML=summary;

                    console.log(salary);
